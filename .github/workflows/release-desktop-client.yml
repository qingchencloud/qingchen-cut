name: Desktop Client Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-client:
    name: Build Windows desktop client
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    env:
      BUN_VERSION: 1.3.14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: windows-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install FFmpeg
        run: choco install ffmpeg -y --no-progress

      - name: Install whisper.cpp bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun script/install-whisper.ts --model base

      - name: Build desktop client
        run: bun run build:desktop-client

      - name: Verify desktop client output
        run: |
          $dist = "dist/qingchen-cut-win32-x64"
          $exe = Join-Path $dist "QingchenCut.exe"
          $server = Join-Path $dist "web/apps/web/server.js"
          $manifestPath = Join-Path $dist "manifest.json"

          if (-not (Test-Path $exe)) { throw "Missing desktop executable: $exe" }
          if (-not (Test-Path $server)) { throw "Missing packaged web server: $server" }
          if (-not (Test-Path $manifestPath)) { throw "Missing manifest: $manifestPath" }

          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          if ($manifest.ok -ne $true) { throw "Desktop manifest is not ok" }
          if ($manifest.files.ffmpegBytes -le 0) { throw "FFmpeg was not bundled" }
          if ($manifest.files.ffprobeBytes -le 0) { throw "FFprobe was not bundled" }

      - name: Package release assets
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "qingchen-cut-$tag-win32-x64.zip"
          $sha = "$zip.sha256"

          Compress-Archive -Path "dist/qingchen-cut-win32-x64/*" -DestinationPath $zip -Force
          $hash = Get-FileHash $zip -Algorithm SHA256
          "$($hash.Hash)  $zip" | Set-Content $sha -Encoding ascii

          "QC_RELEASE_ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "QC_RELEASE_SHA=$sha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: qingchen-cut-${{ github.ref_name }}-win32-x64
          path: |
            qingchen-cut-${{ github.ref_name }}-win32-x64.zip
            qingchen-cut-${{ github.ref_name }}-win32-x64.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $title = "Qingchen Cut $tag"
          $notes = @"
          Windows desktop client for Qingchen Cut.

          - Download and unzip `${env:QC_RELEASE_ZIP}`.
          - Run `QingchenCut.exe`.
          - The app starts a local server and opens the native Web editor at `/projects`.
          - Includes the internal Bun runtime, FFmpeg/FFprobe, and the bundled whisper.cpp base model when the build step succeeds.

          The `.sha256` file can be used to verify the downloaded zip.
          "@

          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }
          $isPrerelease = $tag -match "-"
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release upload $tag $env:QC_RELEASE_ZIP $env:QC_RELEASE_SHA --clobber
            if ($isPrerelease) {
              gh release edit $tag --prerelease
            }
          } else {
            $createArgs = @("release", "create", $tag, $env:QC_RELEASE_ZIP, $env:QC_RELEASE_SHA, "--title", $title, "--notes", $notes, "--verify-tag")
            if ($isPrerelease) {
              $createArgs += "--prerelease"
            }
            gh @createArgs
          }
